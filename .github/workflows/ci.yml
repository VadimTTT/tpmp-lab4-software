name: CI Build and Test

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3 libsqlite3-dev gcc make

      - name: Create database schema
        run: |
          sqlite3 aviation.db < sql/aviation_schema.sql

      - name: Run custom tests (SQL queries)
        run: |
          echo "=== Test 1: Check helicopters table ==="
          sqlite3 aviation.db "SELECT COUNT(*) FROM helicopters;"
          
          echo "=== Test 2: Check crew table ==="
          sqlite3 aviation.db "SELECT COUNT(*) FROM crew;"
          
          echo "=== Test 3: Check flights table ==="
          sqlite3 aviation.db "SELECT COUNT(*) FROM flights;"
          
          echo "=== Test 4: Total flight hours per helicopter ==="
          sqlite3 aviation.db "SELECT helicopter_id, SUM(duration) FROM flights GROUP BY helicopter_id;"
          
          echo "=== Test 5: Special flights stats ==="
          sqlite3 aviation.db "SELECT COUNT(*), SUM(cargo_mass), SUM(cost) FROM flights WHERE flight_code='спец';"

      - name: Run SQLite tests (3+ tests per table/file)
        run: |
          echo "\n=== Testing helicopters ==="
          sqlite3 aviation.db "SELECT serial_number, model FROM helicopters WHERE capacity > 5000;"
          sqlite3 aviation.db "SELECT model FROM helicopters WHERE manufacture_date > '2015-01-01';"
          sqlite3 aviation.db "SELECT serial_number, flight_resource FROM helicopters ORDER BY flight_resource DESC LIMIT 1;"

          echo "\n=== Testing crew ==="
          sqlite3 aviation.db "SELECT full_name, position FROM crew WHERE experience > 10;"
          sqlite3 aviation.db "SELECT full_name FROM crew WHERE birth_year < 1985;"
          sqlite3 aviation.db "SELECT position, COUNT(*) FROM crew GROUP BY position;"

          echo "\n=== Testing flights ==="
          sqlite3 aviation.db "SELECT flight_code, COUNT(*) FROM flights GROUP BY flight_code;"
          sqlite3 aviation.db "SELECT flight_date, cost FROM flights WHERE cost > 100000;"
          sqlite3 aviation.db "SELECT AVG(duration) FROM flights;"

      - name: Prepare test report
        run: |
          mkdir -p test-results
          sqlite3 aviation.db ".tables" > test-results/tables_list.txt
          sqlite3 aviation.db "SELECT COUNT(*) FROM helicopters;" > test-results/helicopters_count.txt
          sqlite3 aviation.db "SELECT COUNT(*) FROM crew;" > test-results/crew_count.txt
          sqlite3 aviation.db "SELECT COUNT(*) FROM flights;" > test-results/flights_count.txt

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
