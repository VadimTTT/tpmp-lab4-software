name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SQLite
        run: sudo apt-get update && sudo apt-get install -y sqlite3
      - name: Create DB from schema
        run: sqlite3 aviation.db < sql/aviation_schema.sql
      - name: Run tests
        run: |
          echo "=== Test 1: helicopters ==="
          sqlite3 aviation.db "SELECT COUNT(*) FROM helicopters;"
          echo "=== Test 2: crew ==="
          sqlite3 aviation.db "SELECT COUNT(*) FROM crew;"
          echo "=== Test 3: flights ==="
          sqlite3 aviation.db "SELECT COUNT(*) FROM flights;"
          echo "=== Test 4: helicopters capacity >5000 ==="
          sqlite3 aviation.db "SELECT model FROM helicopters WHERE capacity > 5000;"
          echo "=== Test 5: crew experience >10 ==="
          sqlite3 aviation.db "SELECT full_name FROM crew WHERE experience > 10;"
          echo "=== Test 6: flights cost >100000 ==="
          sqlite3 aviation.db "SELECT flight_code, cost FROM flights WHERE cost > 100000;"